<mat-card>
  <mat-card-header>
    <mat-card-title style="text-align: center">{{ cityName() }}</mat-card-title>
<mat-card-subtitle style="text-align: center; color: #ffffff">{{ dateTime() }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <app-weather-icon [weatherCode]="weatherCode()" size="120px" />
    <p class="temperature">{{ temperature() }}°C</p>
    <p class="description">{{ description() }}</p>
    <div class="forecast">
      @for (item of forecast(); track item.time) {
        <div class="forecast-item">
          <span>{{ item.time }}</span>
          <span>{{ item.icon }}</span>
          <span>{{ item.temp }}°C</span>
        </div>
      }
    </div>
    <div class="chart-container">
      <canvas #chartCanvas></canvas>
    </div>
  </mat-card-content>
</mat-card>
