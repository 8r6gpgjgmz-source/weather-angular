<mat-card>
  <mat-card-header>
    <mat-card-title>{{ cityName() }}</mat-card-title>
    <mat-card-subtitle>{{ dateTime() }}</mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <p class="icon">{{ weatherIcon() }}</p>
    <p class="temperature">{{ temperature() }}°C</p>
    <p class="description">{{ description() }}</p>
    <div class="forecast">
      @for (item of forecast(); track item.time) {
        <div class="forecast-item">
          <span>{{ item.time }}</span>
          <span>{{ item.icon }}</span>
          <span>{{ item.temp }}°C</span>
        </div>
      }
    </div>
  </mat-card-content>
</mat-card>
